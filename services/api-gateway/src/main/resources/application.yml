spring:
  application:
    name: api-gateway
  # As rotas estao definidas em GatewayConfig.java (URIs configuraveis por ambiente,
  # com StripPrefix=1). Em Docker, os SERVICES_*_URI apontam para os nomes de container.

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  info:
    title: API Gateway
    description: Single entry point for all microservices
    version: 1.0.0
    contact:
      name: Cloud Computing Course
      email: support@example.com

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    pt.ulusofona.apigateway: DEBUG

