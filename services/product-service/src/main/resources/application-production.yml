# Perfil de produção: usa PostgreSQL (RDS) em vez do H2 em memória.
# Ativar com SPRING_PROFILES_ACTIVE=production.
# As credenciais vêm de variáveis de ambiente (injetadas pelo deploy a partir
# dos parâmetros SSM) — nunca escritas no código.
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      # Cria/atualiza as tabelas no arranque (demo; produção real usaria migrações Flyway/Liquibase).
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: false   # consola H2 desligada em produção
